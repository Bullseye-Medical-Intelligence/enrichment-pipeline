# Deploy the static site in site/ to Hostinger.
#
# Why this exists: the Claude Code cloud environment can only make outbound
# HTTPS connections, so it cannot reach Hostinger over FTP/SFTP. GitHub-hosted
# runners have open egress, so deploys run here. Workflow: edit site/ in the
# repo -> push to main -> this job pushes the changes live.
#
# Safety rails:
#   * Manual runs default to mode=dry-run (connects, logs the diff, writes
#     NOTHING). Always dry-run a new config once before a real deploy.
#   * dangerous-clean-slate is never enabled, so the action never wipes the
#     server; on the first deploy it uploads site/ and leaves unknown remote
#     files untouched.
#   * Auto-deploy only fires on push to main when files under site/ change.
#
# Run Hostinger Pull FIRST to populate site/ with the real live files, so a
# deploy overwrites pages with faithful copies rather than guessed ones.
#
# Requires repo secrets: HOSTINGER_SFTP_HOST, HOSTINGER_SFTP_USER,
# HOSTINGER_SFTP_PASSWORD (Settings -> Secrets and variables -> Actions).
name: Hostinger Deploy

on:
  push:
    branches: [main]
    paths: ["site/**"]
  workflow_dispatch:
    inputs:
      mode:
        description: "dry-run (no writes) or deploy (writes to live site)"
        type: choice
        options: [dry-run, deploy]
        default: dry-run
      protocol:
        description: "Transfer protocol"
        type: choice
        options: [sftp, ftp]
        default: sftp
      port:
        description: "Port (sftp=22, ftp=21)"
        type: string
        default: "22"
      server_dir:
        description: "Remote web root to deploy into. Must end with /"
        type: string
        default: "./"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Verify secrets present
        run: |
          if [ -z "${{ secrets.HOSTINGER_SFTP_HOST }}" ]; then
            echo "::error::Hostinger secrets missing. Add HOSTINGER_SFTP_HOST/USER/PASSWORD in Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Deploy site/ to Hostinger
        # On push events inputs.* are empty, so the `||` fallbacks pick the
        # production defaults (sftp / 22 / ./, real deploy). Manual runs honour
        # the chosen inputs and default to a safe dry-run.
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.HOSTINGER_SFTP_HOST }}
          username: ${{ secrets.HOSTINGER_SFTP_USER }}
          password: ${{ secrets.HOSTINGER_SFTP_PASSWORD }}
          protocol: ${{ inputs.protocol || 'sftp' }}
          port: ${{ inputs.port || '22' }}
          local-dir: ./site/
          server-dir: ${{ inputs.server_dir || './' }}
          dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'dry-run' }}
          dangerous-clean-slate: false
          log-level: verbose

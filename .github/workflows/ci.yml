name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r pipeline-api/requirements.txt

      - name: Run tests
        run: pytest tests/ -v --tb=short

      - name: Dry-run smoke test
        run: |
          printf 'name,city,state\nTest Clinic,Austin,TX\n' > "${RUNNER_TEMP}/sample.csv"
          python pipeline.py \
            --input "${RUNNER_TEMP}/sample.csv" \
            --source outscraper \
            --dry-run

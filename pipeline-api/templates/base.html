<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}BEMI Pipeline{% endblock %}</title>
  <link rel="icon" href="/bullseye-favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css?v=8">
</head>
<body>
  <nav class="navbar">
    <div class="nav-brand">
      <a href="/" class="nav-logo">
        <svg width="24" height="24" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" class="nav-logo-mark" aria-hidden="true">
          <line x1="18" y1="24.5" x2="7" y2="9" stroke="#f7f6f4" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="18" y1="24.5" x2="18" y2="6" stroke="#f7f6f4" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="18" y1="24.5" x2="29" y2="9" stroke="#f7f6f4" stroke-width="1.6" stroke-linecap="round"/>
          <circle cx="7" cy="8.5" r="2.4" fill="#0a0a0a" stroke="#f7f6f4" stroke-width="1.5"/>
          <circle cx="18" cy="5.5" r="2.4" fill="#0a0a0a" stroke="#f7f6f4" stroke-width="1.5"/>
          <circle cx="29" cy="8.5" r="2.4" fill="#0a0a0a" stroke="#f7f6f4" stroke-width="1.5"/>
          <circle cx="18" cy="25" r="3.4" fill="#c84b2f"/>
        </svg>Bullseye Medical Intelligence
      </a>
    </div>
    <div class="nav-links">
      {% if username is defined and username %}
        <a href="/projects" class="nav-link">Projects</a>
        <a href="/icp-profiles" class="nav-link">ICP Profiles</a>
        <a href="/dashboard" class="nav-link">Runs</a>
        <a href="/discovery" class="nav-link">Market Radar</a>
        <a href="/upload" class="nav-link">New Run</a>
        <span class="nav-user">{{ username }}</span>
        <a href="/logout" class="nav-link nav-logout">Logout</a>
      {% endif %}
    </div>
  </nav>

  {% if flash %}
  <div class="flash flash-{{ flash.type }}">{{ flash.message }}</div>
  {% endif %}

  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="/static/app.js?v=2"></script>
</body>
</html>

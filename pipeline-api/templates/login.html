<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — BEMI Pipeline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
  <link rel="icon" href="/bullseye-favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-brand">
      <svg width="36" height="36" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" style="margin-bottom:12px;">
        <line x1="10" y1="3" x2="15" y2="15" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="3" y1="24" x2="15" y2="15" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
        <line x1="28" y1="18" x2="15" y2="15" stroke="#0a0a0a" stroke-width="1.4" stroke-linecap="round"/>
        <circle cx="15" cy="15" r="3" fill="#c84b2f"/>
      </svg>
      <h1>BEMI</h1>
      <p>Enrichment Pipeline</p>
    </div>

    {% if error %}
    <div class="alert alert-error">{{ error }}</div>
    {% endif %}

    <form method="post" action="/login" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username"
               autofocus required placeholder="your username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               autocomplete="current-password" required placeholder="your password">
      </div>
      <button type="submit" class="btn-login">Sign In</button>
    </form>
  </div>
</body>
</html>
